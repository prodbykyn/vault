<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #090909;
  --bg2:   #101010;
  --bg3:   #151515;
  --bg4:   #1a1a1a;
  --bg5:   #202020;
  --neon:       #00ff88;
  --neon-mid:   #00cc6a;
  --neon-dim:   rgba(0,255,136,0.08);
  --neon-dim2:  rgba(0,255,136,0.14);
  --neon-border:rgba(0,255,136,0.25);
  --text:  #efefef;
  --text2: #808080;
  --text3: #404040;
  --border:#1f1f1f;
  --border2:#2a2a2a;
  --red:   #ff4545;
  --amber: #ffaa00;
  --blue:  #4d8fff;
  --r:  6px;
  --rlg: 12px;
  --rxl: 16px;
}

html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 4px; }

/* TYPOGRAPHY */
.mono { font-family: 'JetBrains Mono', monospace; }

/* UTILS */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

/* ── LAYOUT ── */
#root { min-height: 100dvh; display: flex; flex-direction: column; }

/* ── AUTH ── */
.auth-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 1.5rem; min-height: 100dvh;
}
.auth-card {
  width: 100%; max-width: 380px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--rxl); padding: clamp(1.75rem, 5vw, 2.5rem);
}
.auth-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--neon); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;
}
.auth-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--neon); display: block; }
.auth-title { font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
.auth-sub { font-size: 14px; color: var(--text2); margin-bottom: 2rem; font-weight: 300; }
.auth-error { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--red); margin-top: 0.6rem; min-height: 16px; }

/* FORM ELEMENTS */
.field-group { margin-bottom: 0.9rem; }
.field-label {
  display: block; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text2); margin-bottom: 5px;
}
.input {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400;
  padding: 0.7rem 0.9rem; border-radius: var(--r); outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.input:focus { border-color: var(--neon); }
.input::placeholder { color: var(--text3); }
textarea.input { resize: vertical; min-height: 90px; line-height: 1.6; }
select.input { cursor: pointer; }
option { background: #111; }
.input-hint { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 4px; }

.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--neon); color: #000; font-weight: 600;
  font-family: 'DM Sans', sans-serif; font-size: 14px; border: none;
  padding: 0.75rem 1.5rem; border-radius: var(--r); cursor: pointer;
  transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary.full { width: 100%; }

.btn-ghost {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid var(--border2); color: var(--text2);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400;
  padding: 0.55rem 1rem; border-radius: var(--r); cursor: pointer;
  transition: border-color 0.15s, color 0.15s; white-space: nowrap;
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.btn-neon-outline {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid var(--neon-border); color: var(--neon);
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.05em;
  padding: 0.55rem 1rem; border-radius: var(--r); cursor: pointer;
  transition: background 0.15s; white-space: nowrap;
}
.btn-neon-outline:hover { background: var(--neon-dim2); }
.btn-neon-outline:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

.btn-danger { color: var(--red) !important; border-color: rgba(255,69,69,0.25) !important; }
.btn-danger:hover { background: rgba(255,69,69,0.08) !important; border-color: rgba(255,69,69,0.5) !important; }

/* ── TOPBAR ── */
.topbar {
  height: 52px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(1rem, 4vw, 2rem);
  position: sticky; top: 0; z-index: 100;
  background: rgba(9,9,9,0.92); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  gap: 12px;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.topbar-logo { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--neon); letter-spacing: 0.1em; }
.topbar-sep { width: 1px; height: 14px; background: var(--border2); }
.topbar-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.user-chip {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--border2);
  padding: 3px 10px; border-radius: 20px; white-space: nowrap;
}
/* mobile: hide some topbar items */
@media (max-width: 500px) {
  .topbar-sep, .topbar-name { display: none; }
  .btn-ghost span { display: none; }
}

/* ── CONTENT ── */
.content {
  flex: 1; padding: clamp(1rem, 4vw, 2rem);
  max-width: 1400px; width: 100%; margin: 0 auto;
}

/* ── SYNC BAR ── */
.sync-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 1.5rem;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3);
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s; }
.sync-dot.idle    { background: var(--text3); }
.sync-dot.ok      { background: var(--neon); }
.sync-dot.err     { background: var(--red); }
.sync-dot.loading { background: var(--amber); animation: blink 0.9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── STATS ── */
.stats-row {
  display: flex; gap: clamp(1rem, 4vw, 2.5rem);
  margin-bottom: 1.75rem; padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.stat-val { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.stat-val.neon  { color: var(--neon); }
.stat-val.blue  { color: var(--blue); }
.stat-val.amber { color: var(--amber); }
.stat-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; flex-wrap: wrap; align-items: center; }
.filter-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 2px; }
.filter-chip {
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text2);
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 5px 13px; border-radius: 20px; cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--neon-border); color: var(--text); }
.filter-chip.active { background: var(--neon-dim2); border-color: var(--neon-border); color: var(--neon); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
  gap: 1rem;
}

/* ── CARD ── */
.card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--rlg); overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  cursor: pointer; outline: none;
}
.card:hover, .card:focus-visible { border-color: var(--neon-border); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
.card:focus-visible { outline: 2px solid var(--neon); outline-offset: 2px; }

.card-cover {
  width: 100%; height: 155px; background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3);
  overflow: hidden; flex-shrink: 0; position: relative;
}
.card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; inset: 0; }

.card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
  padding: 3px 9px; border-radius: 4px; align-self: flex-start;
}
.status-badge.idea { background: rgba(77,143,255,0.1);  color: var(--blue);  border: 1px solid rgba(77,143,255,0.22); }
.status-badge.wip  { background: rgba(255,170,0,0.1);   color: var(--amber); border: 1px solid rgba(255,170,0,0.22); }
.status-badge.done { background: var(--neon-dim2); color: var(--neon); border: 1px solid var(--neon-border); }

.card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.35; }
.card-desc { font-size: 13px; color: var(--text2); line-height: 1.65; font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }

.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); background: var(--bg4); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; }

.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
.card-author { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); }
.card-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--neon); background: var(--neon-dim); border: 1px solid var(--neon-border); padding: 2px 8px; border-radius: 4px; text-decoration: none; }
.card-link:hover { background: var(--neon-dim2); }

.card-btns { display: flex; gap: 5px; margin-top: 4px; }
.btn-card { background: var(--bg4); border: 1px solid var(--border2); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; padding: 4px 11px; border-radius: 4px; cursor: pointer; transition: all 0.12s; }
.btn-card:hover { border-color: var(--border2); color: var(--text); }
.btn-card.del:hover { border-color: rgba(255,69,69,0.4); color: var(--red); }

.empty {
  grid-column: 1/-1; text-align: center; padding: clamp(3rem,10vw,6rem) 2rem;
  color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 2.5;
}
.empty-mark { font-size: 2rem; display: block; margin-bottom: 0.5rem; color: var(--border2); }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 300; display: flex; align-items: flex-start; justify-content: center;
  padding: clamp(1rem, 4vw, 2rem); overflow-y: auto;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--rxl); width: 100%; max-width: 500px; padding: clamp(1.5rem, 5vw, 2rem);
  margin: auto; animation: slideUp 0.18s ease;
  position: relative;
}
@keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }

/* SHORTCUTS HINT */
.kbd-hint { display: flex; gap: 12px; margin-top: 0.75rem; flex-wrap: wrap; }
.kbd { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.key { background: var(--bg4); border: 1px solid var(--border2); border-radius: 4px; padding: 1px 5px; font-size: 10px; color: var(--text3); }

/* ── DETAIL ── */
.detail-cover { width: 100%; height: 200px; object-fit: cover; border-radius: var(--r); margin-bottom: 1.25rem; display: block; }
.detail-cover-ph { width: 100%; height: 70px; border-radius: var(--r); margin-bottom: 1.25rem; background: var(--bg4); border: 1px dashed var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); }
.detail-title { font-size: clamp(1.1rem,4vw,1.35rem); font-weight: 700; letter-spacing: -0.02em; margin: 0.6rem 0 0.75rem; }
.detail-desc { font-size: 14px; color: var(--text2); line-height: 1.85; white-space: pre-wrap; font-weight: 300; margin-bottom: 1.25rem; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 7px; }
.meta-chip { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); background: var(--bg4); border: 1px solid var(--border); padding: 4px 11px; border-radius: 20px; }
.meta-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--neon); background: var(--neon-dim); border: 1px solid var(--neon-border); padding: 4px 11px; border-radius: 20px; text-decoration: none; }
.meta-link:hover { background: var(--neon-dim2); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 0.7rem 1.1rem;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn 0.2s ease; max-width: calc(100vw - 3rem);
}
.toast.ok  { border-color: var(--neon-border); color: var(--neon); }
.toast.err { border-color: rgba(255,69,69,0.3); color: var(--red); }
@keyframes toastIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ── RESPONSIVE MODAL ── */
@media (max-width: 480px) {
  .overlay { padding: 0; align-items: flex-end; }
  .modal { border-radius: var(--rxl) var(--rxl) 0 0; max-width: 100%; margin: 0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const ACCESS_KEY = 'vault_access_url';

const getSavedUrl = () => localStorage.getItem(ACCESS_KEY);
const saveUrl = (url) => localStorage.setItem(ACCESS_KEY, url);

const DEVICE_KEY = 'vault_device_name';

const getDeviceName = () => localStorage.getItem(DEVICE_KEY);
const saveDeviceName = (name) => localStorage.setItem(DEVICE_KEY, name);

const STATUS_META = {
  idea: { label: 'idea',       cls: 'idea',  icon: '💡' },
  wip:  { label: 'wip',        cls: 'wip',   icon: '🔧' },
  done: { label: 'completato', cls: 'done',  icon: '✅' },
};

// ═══════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════
const LS_KEY = 'vault_v3';
const loadLocal  = () => { try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : []; } catch { return []; } };
const saveLocal  = (data) => { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {} };

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toLocaleDateString('it-IT');
const parseTags = (s) => (s||'').split(',').map(t=>t.trim()).filter(Boolean);

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function AccessScreen({ onAccess }) {
  const [url, setUrl] = useState('');

  const handleAccess = () => {
    if (!url.includes('script.google.com')) {
      alert('URL non valido');
      return;
    }
    saveUrl(url);
    onAccess(url);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-eyebrow">vault.ideas</div>
        <div className="auth-title">accesso</div>
        <div className="auth-sub">incolla URL Apps Script</div>

        <input
          className="input"
          value={url}
          onChange={e => setUrl(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === 'Enter') handleAccess();
            if (e.key === 'Escape') setUrl('');
          }}
        />

        <button className="btn-primary full" style={{marginTop:'1rem'}} onClick={handleAccess}>
          entra →
        </button>
      </div>
    </div>
  );
}

function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}><span>{type === 'ok' ? '●' : '✕'}</span>{msg}</div>;
}

// ═══════════════════════════════════════
//  AUTH SCREEN
// ═══════════════════════════════════════
function AuthScreen({ onLogin }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr]   = useState('');
  const passRef = useRef();

  const attempt = () => {
    const u = user.trim().toLowerCase();
    if (USERS[u] && USERS[u] === pass) { setErr(''); onLogin(u); }
    else setErr('// credenziali errate');
  };

  const onKey = (e, next) => {
    if (e.key === 'Enter') { e.preventDefault(); next ? next() : attempt(); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-eyebrow">vault.ideas</div>
        <div className="auth-title">accedi</div>
        <div className="auth-sub">inserisci le credenziali per entrare</div>
        <div className="field-group">
          <label className="field-label">username</label>
          <input className="input" type="text" placeholder="username" autoComplete="off" spellCheck="false"
            value={user} onChange={e => setUser(e.target.value)}
            onKeyDown={e => onKey(e, () => passRef.current?.focus())} autoFocus />
        </div>
        <div className="field-group">
          <label className="field-label">password</label>
          <input className="input" type="password" placeholder="password" ref={passRef}
            value={pass} onChange={e => setPass(e.target.value)}
            onKeyDown={e => onKey(e, null)} />
        </div>
        <button className="btn-primary full" style={{marginTop:'0.5rem'}} onClick={attempt}>entra →</button>
        <div className="auth-error">{err}</div>
        <div className="kbd-hint" style={{marginTop:'1rem'}}>
          <span className="kbd"><span className="key">Enter</span> per accedere</span>
          <span className="kbd"><span className="key">Tab</span> per spostarsi</span>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  PROJECT FORM MODAL
// ═══════════════════════════════════════
function FormModal({ project, onSave, onClose }) {
  const editing = !!project?.id;
  const [title,  setTitle]  = useState(project?.title  || '');
  const [desc,   setDesc]   = useState(project?.desc   || '');
  const [tags,   setTags]   = useState(project?.tags   || '');
  const [status, setStatus] = useState(project?.status || 'idea');
  const [img,    setImg]    = useState(project?.img    || '');
  const [link,   setLink]   = useState(project?.link   || '');

  const handleSave = () => {
    if (!title.trim()) { alert('inserisci un titolo.'); return; }
    onSave({ title: title.trim(), desc: desc.trim(), tags: tags.trim(), status, img: img.trim(), link: link.trim() });
  };

  // KEYBOARD SHORTCUTS inside modal
  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); onClose(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); handleSave(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [title, desc, tags, status, img, link]);

  return (
    <div className="overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-label={editing ? 'Modifica progetto' : 'Nuovo progetto'}>
        <div className="modal-title">{editing ? 'modifica progetto' : 'nuovo progetto'}</div>

        <div className="field-group">
          <label className="field-label">titolo *</label>
          <input className="input" type="text" placeholder="nome del progetto o idea" autoFocus
            value={title} onChange={e => setTitle(e.target.value)} />
        </div>
        <div className="field-group">
          <label className="field-label">descrizione</label>
          <textarea className="input" placeholder="di cosa si tratta? obiettivi, prossimi passi..."
            value={desc} onChange={e => setDesc(e.target.value)} />
        </div>
        <div className="field-group">
          <label className="field-label">tag</label>
          <input className="input" type="text" placeholder="musica, coding, blender"
            value={tags} onChange={e => setTags(e.target.value)} />
          <div className="input-hint">// separati da virgola</div>
        </div>
        <div className="field-group">
          <label className="field-label">stato</label>
          <select className="input" value={status} onChange={e => setStatus(e.target.value)}>
            <option value="idea">💡  idea</option>
            <option value="wip">🔧  wip — in corso</option>
            <option value="done">✅  completato</option>
          </select>
        </div>
        <div className="field-group">
          <label className="field-label">url immagine cover</label>
          <input className="input" type="url" placeholder="https://..."
            value={img} onChange={e => setImg(e.target.value)} />
          <div className="input-hint">// URL diretto immagine (jpg, png, webp)</div>
        </div>
        <div className="field-group">
          <label className="field-label">link esterno</label>
          <input className="input" type="url" placeholder="https://github.com/..."
            value={link} onChange={e => setLink(e.target.value)} />
          <div className="input-hint">// repo, figma, sito, drive…</div>
        </div>

        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>annulla</button>
          <button className="btn-primary" onClick={handleSave}>salva →</button>
        </div>

        <div className="kbd-hint" style={{marginTop:'1rem'}}>
          <span className="kbd"><span className="key">Ctrl</span><span className="key">↵</span> salva</span>
          <span className="kbd"><span className="key">Esc</span> chiudi</span>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  DETAIL MODAL
// ═══════════════════════════════════════
function DetailModal({ project, onClose, onEdit }) {
  const sm = STATUS_META[project.status] || STATUS_META.idea;
  const tags = parseTags(project.tags);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'e' || e.key === 'E') { e.preventDefault(); onEdit(project); onClose(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [project]);

  return (
    <div className="overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-label={project.title}>
        {project.img
          ? <img className="detail-cover" src={project.img} alt="" onError={e => e.target.style.display='none'} />
          : <div className="detail-cover-ph">nessuna immagine</div>
        }
        <div className={`status-badge ${sm.cls}`}>{sm.icon} {sm.label}</div>
        <div className="detail-title">{project.title}</div>
        <div className="detail-desc">{project.desc || 'nessuna descrizione.'}</div>
        <div className="detail-meta">
          <div className="meta-chip">// {project.author}</div>
          <div className="meta-chip">{project.createdAt}</div>
          {tags.map(t => <div className="meta-chip" key={t}># {t}</div>)}
          {project.link && <a className="meta-link" href={project.link} target="_blank" rel="noreferrer">→ apri link</a>}
        </div>

        <div className="modal-actions" style={{marginTop:'1.5rem'}}>
          <button className="btn-ghost" onClick={() => { onEdit(project); onClose(); }}>modifica</button>
          <button className="btn-ghost" onClick={onClose}>← chiudi</button>
        </div>
        <div className="kbd-hint" style={{marginTop:'0.75rem'}}>
          <span className="kbd"><span className="key">E</span> modifica</span>
          <span className="kbd"><span className="key">Esc</span> chiudi</span>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  CARD
// ═══════════════════════════════════════
function ProjectCard({ project, onOpen, onEdit, onDelete }) {
  const sm   = STATUS_META[project.status] || STATUS_META.idea;
  const tags = parseTags(project.tags);

  const handleKey = (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onOpen(project); }
    if (e.key === 'e' || e.key === 'E') { e.preventDefault(); onEdit(project); }
    if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); onDelete(project.id); }
  };

  return (
    <div className="card" tabIndex={0} onClick={() => onOpen(project)} onKeyDown={handleKey}
      role="article" aria-label={project.title}>
      <div className="card-cover">
        {project.img && <img src={project.img} alt="" onError={e => e.target.style.display='none'} />}
        {!project.img && 'no cover'}
      </div>
      <div className="card-body">
        <div className={`status-badge ${sm.cls}`}>{sm.icon} {sm.label}</div>
        <div className="card-title">{project.title}</div>
        {project.desc && <div className="card-desc">{project.desc}</div>}
        {tags.length > 0 && (
          <div className="card-tags">{tags.map(t => <span className="tag" key={t}>{t}</span>)}</div>
        )}
        <div className="card-footer">
          <div className="card-author">// {project.author}</div>
          {project.link && (
            <a className="card-link" href={project.link} target="_blank" rel="noreferrer"
              onClick={e => e.stopPropagation()}>→ link</a>
          )}
        </div>
        <div className="card-btns">
          <button className="btn-card" onClick={e => { e.stopPropagation(); onEdit(project); }}>modifica</button>
          <button className="btn-card del" onClick={e => { e.stopPropagation(); onDelete(project.id); }}>elimina</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════
function App() {
  const [scriptUrl, setScriptUrl] = useState(getSavedUrl());
  const [projects, setProjects] = useState([]);
  const [syncState, setSyncState] = useState({ dot: 'idle', label: 'in attesa' });
  const [filter, setFilter] = useState('all');

  const [formModal, setFormModal] = useState(null);
  const [detailP, setDetailP] = useState(null);

  const [toast, setToast] = useState(null);

  const [deviceName, setDeviceName] = useState(getDeviceName());

  const showToast = (msg, type='ok') => {
    setToast({ key: Date.now(), msg, type });
  };

  // 👇 1. PRIMA la funzione
  const syncFromSheet = useCallback(async () => {
    if (!scriptUrl) return;

    setSyncState({ dot: 'loading', label: 'sincronizzazione...' });

    try {
      const res  = await fetch(scriptUrl + '?action=get');
      const data = await res.json();

      if (data.ok) {
        setProjects(data.projects || []);
        saveLocal(data.projects || []);
        setSyncState({
          dot: 'ok',
          label: 'sync OK — ' + new Date().toLocaleTimeString('it-IT')
        });
      } else {
        setSyncState({
          dot: 'err',
          label: 'errore: ' + (data.error || '?')
        });
      }
    } catch {
      const local = loadLocal();
      setProjects(local);
      setSyncState({
        dot: 'err',
        label: 'errore di rete — dati locali'
      });
    }
  }, [scriptUrl]);

  // 👇 2. SUBITO DOPO metti questo
  useEffect(() => {
    if (scriptUrl) {
      const local = loadLocal();
      setProjects(local);
      syncFromSheet();
    }
  }, [scriptUrl]);

  const pushToSheet = async (proj, action) => {
    try { await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action, project: proj }) }); }
    catch {}
  };
  const deleteFromSheet = async (id) => {
    try { await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) }); }
    catch {}
  };

  // ── GLOBAL SHORTCUTS ──
  useEffect(() => {
    const handler = (e) => {
      const tag = document.activeElement?.tagName;
      if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
      if (formModal || detailP) return;
      if (e.key === 'n' || e.key === 'N') { e.preventDefault(); setFormModal({}); }
      if (e.key === 'r' || e.key === 'R') { e.preventDefault(); syncFromSheet(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [formModal, detailP, syncFromSheet]);

  // ── SAVE / DELETE ──
  const handleSave = async (fields) => {
    const editing  = formModal?.project;
    const existing = editing ? projects.find(p => p.id === editing.id) : null;
    const proj = {
      id:        existing?.id || uid(),
      author: existing?.author || deviceName,
      createdAt: existing?.createdAt || today(),
      updatedAt: today(),
      ...fields,
    };
    let updated;
    if (existing) {
      updated = projects.map(p => p.id === proj.id ? proj : p);
    } else {
      updated = [proj, ...projects];
    }
    setProjects(updated);
    saveLocal(updated);
    setFormModal(null);
    await pushToSheet(proj, existing ? 'update' : 'add');
    showToast(existing ? 'progetto aggiornato' : 'progetto aggiunto', 'ok');
    setSyncState({ dot: 'ok', label: 'salvato — ' + new Date().toLocaleTimeString('it-IT') });
  };

  const handleDelete = async (id) => {
    if (!confirm('eliminare questo progetto?')) return;
    const updated = projects.filter(p => p.id !== id);
    setProjects(updated);
    saveLocal(updated);
    await deleteFromSheet(id);
    showToast('progetto eliminato', 'ok');
    setSyncState({ dot: 'ok', label: 'eliminato — ' + new Date().toLocaleTimeString('it-IT') });
  };

  // ── FILTER ──
  const filtered = filter === 'all' ? projects : projects.filter(p => p.status === filter);
  const counts   = { idea: projects.filter(p=>p.status==='idea').length, wip: projects.filter(p=>p.status==='wip').length, done: projects.filter(p=>p.status==='done').length };

  if (!deviceName) return <DeviceScreen onSave={setDeviceName} />;
  if (!scriptUrl) return <AccessScreen onAccess={setScriptUrl} />;

  return (
    <>
      {/* TOPBAR */}
      <header className="topbar">
        <div className="topbar-brand">
          <div className="topbar-logo">// vault</div>
          <div className="topbar-sep" />
          <div className="topbar-name">ideas & projects</div>
        </div>
        <div className="topbar-actions">
          <div className="user-chip">// {deviceName}</div>
          <button className="btn-neon-outline" onClick={syncFromSheet}
            disabled={syncState.dot === 'loading'} title="Sincronizza (R)">
            ↻ <span>sync</span>
          </button>
          <button className="btn-ghost" onClick={() => {
            localStorage.removeItem(ACCESS_KEY);
            setScriptUrl(null);
            }}>
            <span>cambia url</span>
          </button>
          <button className="btn-ghost" onClick={() => {
            const nuovo = prompt('nuovo nome dispositivo:');
            if (nuovo) {
              saveDeviceName(nuovo);
              setDeviceName(nuovo);
            }
          }}>
            <span>cambia nome</span>
          </button>
          <button className="btn-primary" onClick={() => setFormModal({})} title="Nuovo progetto (N)">
            + nuovo
          </button>
        </div>
      </header>

      {/* CONTENT */}
      <main className="content">
        {/* Sync status */}
        <div className="sync-bar">
          <div className={`sync-dot ${syncState.dot}`} />
          <span>{syncState.label}</span>
        </div>

        {/* Stats */}
        <div className="stats-row">
          <div><div className="stat-val neon">{projects.length}</div><div className="stat-lbl">totale</div></div>
          <div><div className="stat-val blue">{counts.idea}</div><div className="stat-lbl">idee</div></div>
          <div><div className="stat-val amber">{counts.wip}</div><div className="stat-lbl">in corso</div></div>
          <div><div className="stat-val neon">{counts.done}</div><div className="stat-lbl">completati</div></div>
        </div>

        {/* Filters */}
        <div className="filter-bar">
          <span className="filter-label">vista:</span>
          {['all','idea','wip','done'].map(f => (
            <button key={f} className={`filter-chip${filter===f?' active':''}`} onClick={() => setFilter(f)}>
              {f === 'all' ? 'tutti' : f === 'done' ? 'completati' : f}
            </button>
          ))}
        </div>

        {/* Keyboard hints */}
        <div className="kbd-hint" style={{marginBottom:'1.25rem'}}>
          <span className="kbd"><span className="key">N</span> nuovo</span>
          <span className="kbd"><span className="key">R</span> sincronizza</span>
          <span className="kbd"><span className="key">↵</span> apri card selezionata</span>
          <span className="kbd"><span className="key">E</span> modifica card</span>
          <span className="kbd"><span className="key">Del</span> elimina card</span>
        </div>

        {/* Grid */}
        <div className="grid" role="list">
          {filtered.length === 0 ? (
            <div className="empty">
              <span className="empty-mark">//</span>
              nessun progetto in questa vista.<br />
              premi <strong style={{color:'var(--neon)'}}>N</strong> o <strong style={{color:'var(--neon)'}}>+ nuovo</strong> per iniziare.
            </div>
          ) : filtered.map(p => (
            <ProjectCard key={p.id} project={p}
              onOpen={setDetailP}
              onEdit={proj => setFormModal({ project: proj })}
              onDelete={handleDelete} />
          ))}
        </div>
      </main>

      {/* MODALS */}
      {formModal !== null && (
        <FormModal
          project={formModal.project}
          onSave={handleSave}
          onClose={() => setFormModal(null)} />
      )}
      {detailP && (
        <DetailModal
          project={detailP}
          onClose={() => setDetailP(null)}
          onEdit={proj => { setFormModal({ project: proj }); }} />
      )}

      {/* TOAST */}
      {toast && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </>
  );
}

function DeviceScreen({ onSave }) {
  const [name, setName] = useState('');

  const handle = () => {
    if (!name.trim()) return alert('inserisci un nome');
    saveDeviceName(name.trim());
    onSave(name.trim());
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-eyebrow">vault.device</div>
        <div className="auth-title">nome dispositivo</div>
        <div className="auth-sub">come vuoi chiamare questo dispositivo?</div>

        <input
          className="input"
          value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === 'Enter') handle();
            if (e.key === 'Escape') setName('');
          }}
        />

        <button className="btn-primary full" style={{marginTop:'1rem'}} onClick={handle}>
          salva →
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
